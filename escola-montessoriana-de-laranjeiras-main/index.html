    <!-- Scripts de tracking adiados - carregam após conteúdo -->
    <script>
      // Carrega scripts de tracking após página carregar
      window.addEventListener('load', function() {
        // Meta Pixel Code
        (function() {
          var f = window, b = document, e = 'script', v = 'https://connect.facebook.net/en_US/fbevents.js';
          if (f.fbq) return;
          var n = f.fbq = function() {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = '2.0';
          n.queue = [];
          var t = b.createElement(e);
          t.async = !0;
          t.src = v;
          var s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
          f.fbq = n;
          n('init', '1183448566465118');
          n('track', 'PageView');
        })();

        // Pixel: dispara em todos os cliques do WhatsApp (definido cedo para estar disponível nos botões)
        window.trackWhatsAppConversion = function() {
          if (window.fbq) window.fbq('track', 'Contact');
        };

        // Microsoft Clarity
        (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vk1vrttpc1");

        // Google Analytics
        var gtagScript = document.createElement('script');
        gtagScript.async = true;
        gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=AW-16743400376';
        document.head.appendChild(gtagScript);
        
        gtagScript.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'AW-16743400376');
          var prev = window.trackWhatsAppConversion;
          window.trackWhatsAppConversion = function() {
            if (prev) prev();
            gtag('event', 'conversion', {'send_to': 'AW-16743400376/psM9CKCH4PUbELiH8K8-'});
          };
        };

        // Chat n8n - carrega apenas após tudo carregado
        setTimeout(function() {
          import('https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js').then(function(module) {
            module.createChat({
              webhookUrl: 'https://igorgomessilva.app.n8n.cloud/webhook/1f83e8ac-d465-454a-8327-cef7f0149cb1/chat',
              title: 'Olá! Bem-vindo',
              welcomeMessage: 'Inicie uma conversa. Estamos aqui para ajudar.'
            });
            
            // Traduz textos do chat
            const chatReplacements = [
              { from: /Hi there!\s*👋/gi, to: 'Olá! Bem-vindo' },
              { from: /Hi there!/gi, to: 'Olá! Bem-vindo' },
              { from: /Start a chat\.\s*We're here to help you 24\/7\.?/gi, to: 'Inicie uma conversa. Estamos aqui para ajudar.' },
              { from: /My name is Nathan\. How can I assist you today\?/gi, to: 'Olá! Sou o assistente virtual da Escola Montessoriana. Como posso ajudar você hoje?' }
            ];
            function replaceChatTexts(root) {
              if (!root) return;
              root.querySelectorAll('h1, p, span, div[class*="message"]').forEach(function (el) {
                el.childNodes.forEach(function (node) {
                  if (node.nodeType !== Node.TEXT_NODE) return;
                  let text = node.textContent;
                  chatReplacements.forEach(function (r) {
                    text = text.replace(r.from, r.to);
                  });
                  if (text !== node.textContent) node.textContent = text;
                });
              });
            }
            function observeChat() {
              const chat = document.getElementById('n8n-chat');
              if (!chat) {
                setTimeout(observeChat, 200);
                return;
              }
              replaceChatTexts(chat);
              const obs = new MutationObserver(function () {
                replaceChatTexts(chat);
              });
              obs.observe(chat, { childList: true, subtree: true, characterData: true });
            }
            setTimeout(observeChat, 500);
          });
        }, 2000);
      });
    </script>
